<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Entrar — Financeiro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>

<body>
  <main>
    <form class="login-card" hx-post="/login" hx-target="#login-message" hx-swap="innerHTML" id="login-form">

      <span class="brand-name">Financeiro</span>

      <h1 class="title">Entrar</h1>
      <p class="subtitle">Acesse sua conta</p>

      <div class="field">
        <label for="username">Usuário</label>
        <input type="text" id="username" name="username" placeholder="seu usuário" autocomplete="username" required />
      </div>

      <div class="field">
        <label for="password">Senha</label>
        <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password" required />
      </div>

      <button type="submit">Entrar</button>

      <div id="login-message" class="login-message"></div>
    </form>
  </main>
</body>

</html>
