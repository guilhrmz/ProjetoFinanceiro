<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="description" content="Página de login">
  <title>Entrar — Livro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,600;9..144,700&family=Inter:wght@400;500;600;700&family=IBM+Plex+Mono:wght@400;500;600&display=swap"
    rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>

<body>
  <main class="container">
    <form class="login-card" hx-post="/login" hx-target="#login-message" hx-swap="innerHTML" id="login-form">

      <div class="brand">
        <span class="dot"></span>
        <span class="brand-name">Livro</span>
      </div>

      <h1 class="title">Entrar</h1>
      <p class="subtitle">Acesse seu controle financeiro</p>

      <div class="field">
        <label for="username">Usuário</label>
        <input type="text" id="username" name="username" placeholder="seu usuário" autocomplete="username" required />
      </div>

      <div class="field">
        <label for="password">Senha</label>
        <input type="password" id="password" name="password" placeholder="••••••••" autocomplete="current-password"
          required />
      </div>

      <button type="submit" id="btn-login">Salvar</button>

      <!-- Área onde o HTMX irá colocar a mensagem de erro -->
      <div id="login-message" class="login-message"></div>
    </form>
  </main>
</body>

</html>
