<!DOCTYPE html>
<html lang="pt-br">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Cadastro — Nexo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css">
  <script src="https://unpkg.com/htmx.org@1.9.12"></script>
</head>

<body>
  <main>
    <form class="login-card" hx-post="/cadastro" hx-target="#cadastro-message" hx-swap="innerHTML">

      <span class="brand-name">Nexo</span>

      <h1 class="title">Criar conta</h1>
      <p class="subtitle">Preencha os dados para se cadastrar</p>

      <div class="field">
        <label for="username">Usuário</label>
        <input type="text" id="username" name="username" placeholder="escolha um usuário" autocomplete="off" required />
      </div>

      <div class="field">
        <label for="email">E-mail</label>
        <input type="email" id="email" name="email" placeholder="seu@email.com" autocomplete="email" required />
      </div>

      <div class="field">
        <label for="password">Senha</label>
        <input type="password" id="password" name="password" placeholder="••••••••" required />
      </div>

      <div class="field">
        <label for="confirm">Confirmar senha</label>
        <input type="password" id="confirm" name="confirm" placeholder="••••••••" required />
      </div>

      <button type="submit">Cadastrar</button>

      <div id="cadastro-message" class="login-message"></div>

      <p style="text-align:center; font-size:0.8rem; color:#6B7280;">
        Já tem conta? <a href="/" style="color:#111827; font-weight:500; text-decoration:none;">Entrar</a>
      </p>

    </form>
  </main>
</body>

</html>
